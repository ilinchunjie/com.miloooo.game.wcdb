name: release-unity

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build Windows
        shell: bash
        run: |
          chmod +x unity/scripts/build-host.sh
          OUTPUT_ARCH="x86_64"
          unity/scripts/build-host.sh windows "${{ matrix.arch }}" "${{ github.workspace }}/.build/windows-$OUTPUT_ARCH" "${{ github.workspace }}/artifacts/windows/$OUTPUT_ARCH"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: artifacts/windows/${{ 'x86_64' }}

  build-android:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build
      - name: Build Android
        run: |
          chmod +x unity/scripts/build-android.sh
          unity/scripts/build-android.sh "${{ matrix.abi }}" "$ANDROID_NDK_ROOT" "${{ github.workspace }}/artifacts/android/${{ matrix.abi }}"
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: artifacts/android/${{ matrix.abi }}

  build-apple:
    runs-on: macos-14
    strategy:
      matrix:
        platform: [macos, ios]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Ensure CMake
        run: brew install cmake || true
      - name: Build Apple
        run: |
          chmod +x unity/scripts/build-apple.sh
          unity/scripts/build-apple.sh "${{ matrix.platform }}" "${{ github.workspace }}/artifacts/${{ matrix.platform }}"
      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apple-${{ matrix.platform }}
          path: artifacts/${{ matrix.platform }}

  commit-package:
    runs-on: ubuntu-24.04
    needs:
      - build-windows
      - build-android
      - build-apple
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Copy binaries into Plugins
        run: |
          PKG="unity/package/Plugins"

          # Android
          mkdir -p "$PKG/Android/armeabi-v7a" "$PKG/Android/arm64-v8a" "$PKG/Android/x86_64"
          cp -f downloaded-artifacts/android-armeabi-v7a/libwcdb.so "$PKG/Android/armeabi-v7a/" || true
          cp -f downloaded-artifacts/android-arm64-v8a/libwcdb.so   "$PKG/Android/arm64-v8a/"   || true
          cp -f downloaded-artifacts/android-x86_64/libwcdb.so      "$PKG/Android/x86_64/"      || true

          # iOS
          mkdir -p "$PKG/iOS"
          rm -rf "$PKG/iOS/wcdb.xcframework"
          cp -R downloaded-artifacts/apple-ios/wcdb.xcframework "$PKG/iOS/" || true

          # macOS
          mkdir -p "$PKG/macOS"
          cp -f downloaded-artifacts/apple-macos/libwcdb.dylib "$PKG/macOS/" || true

          # Windows
          mkdir -p "$PKG/x86_64"
          cp -f downloaded-artifacts/windows-x64/wcdb.dll "$PKG/x86_64/" || true

      - name: Update package.json version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json, pathlib
          p = pathlib.Path('unity/package/package.json')
          d = json.loads(p.read_text())
          d['version'] = '$VERSION'
          p.write_text(json.dumps(d, indent=2) + '\n')
          "

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add unity/package/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            VERSION="${GITHUB_REF_NAME#v}"
            git commit -m "chore(unity): update native binaries and version to $VERSION"
            git push origin HEAD:main
          fi
